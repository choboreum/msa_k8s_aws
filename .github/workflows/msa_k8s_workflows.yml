name: deploy order

on:
  push:
    branches:
      - main 


jobs:
  
  # job name
  build-and-deploy:
    
    # runner
    runs-on: ubuntu-latest

    # https://docs.github.com/ko/actions
    steps:
      # 소스 코드 checkout
      - name: checkout github
        uses: actions/checkout@v2
      
      # 리눅스 환경에서 kubectl client설치
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with: 
          version: "v1.34.1"
      
      # aws 인증
      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        # 추가적인 작업
        with:
          aws-access-key-id: ${{secrets.AWS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET}}
          aws-region: ap-south-1
      
      # cluster 환경 구축
      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-south-1 --name lgcns-boreum-cluster

      # ecr login
      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      # 인프라 구축(ingress, kafka, redis, zookeeper, rabbitmq)
      - name: deploy infra
        # 직접 만든 명령어
        run: | # 파이프라인으로 멀티 명령어
          kubectl apply -f ./k8s/msa-ingress.yml
          kubectl apply -f ./k8s/msa-zookeeper.yml
          kubectl apply -f ./k8s/msa-kafka.yml
          kubectl apply -f ./k8s/msa-redis.yml
          
      # ecr에 각각의 image를 만들고 push까지 자동화
      # apigateway
      - name: apigateway image build and push docker image to ecr
        # 환경변수
        env:
          REGISTRY: 447839931800.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: apigateway
          IMAGE_TAG: latest
        # 직접 만든 명령어
        run: | # 파이프라인으로 멀티 명령어
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f ./apigateway/Dockerfile ./apigateway
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
      
      # apply
      - name: eks kubectl apigateway apply 
        run: |
          kubectl apply -f ./apigateway/k8s/apigateway-depl.yml
          kubectl rollout restart deployment apigateway-deployment -n lgcns
          
      # user 
      - name: user image build and push docker image to ecr
        # 환경변수
        env:
          REGISTRY: 447839931800.dkr.ecr.ap-south-1.amazonaws.com
          REPOSITORY: user-service
          IMAGE_TAG: latest
        # 직접 만든 명령어
        run: | # 파이프라인으로 멀티 명령어
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f ./user/Dockerfile ./user
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
      
      # apply
      - name: eks kubectl user apply 
        run: |
          kubectl apply -f ./user/k8s/user-depl.yml
          kubectl rollout restart deployment user-deployment -n lgcns